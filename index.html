<!DOCTYPE html><html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAO BAO</title>
<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
header{background:#c62828;padding:15px;text-align:center}.tabs{display:flex;overflow-x:auto;background:#111;padding:10px;position:sticky;top:0} .tab{padding:8px 12px;margin-right:8px;border-radius:20px;color:#fff;font-size:13px;white-space:nowrap}

.section{padding:15px} .title{padding:10px;border-radius:10px;margin-bottom:10px;font-weight:bold} .item{display:flex;justify-content:space-between;align-items:center;background:#1a1a1a;margin-bottom:10px;padding:12px;border-radius:12px} .add{background:#38d000;border:none;color:#fff;padding:6px 10px;border-radius:8px} .price{font-weight:bold;color:#FFD700}

.actions{position:fixed;bottom:0;width:100%;background:#111;display:flex;justify-content:space-around;padding:10px} .cart-box{position:fixed;bottom:0;left:0;width:100%;height:80%;background:#000;display:none;padding:15px;border-top-left-radius:20px;border-top-right-radius:20px;overflow:auto} </style>

</head>
<body><header>
<h3>🍜 BAO BAO</h3>
<p id="status"></p>
<p>🚚 Dostawa 10 zł | Darmowa od 200 zł</p>
</header><div class="tabs" id="tabs"></div>
<div id="menu"></div><div class="cart-box" id="cartBox">
<h3>🛒 Koszyk</h3>
<div id="cartItems"></div>
<h3 id="total">0 zł</h3>
<input id="name" placeholder="Imię">
<input id="phone" placeholder="Telefon">
<textarea id="address" placeholder="Adres"></textarea>
<button onclick="sendEmail()" style="width:100%;margin-top:10px;background:#c62828;color:#fff">📩 Zamów Email</button>
<button onclick="sendWhatsApp()" style="width:100%;margin-top:10px;background:#25D366;color:#fff">💬 Zamów WhatsApp</button>
<button onclick="closeCart()" style="width:100%;margin-top:10px">Zamknij</button>
</div><div id="floatingTotal" style="position:fixed;bottom:70px;right:15px;background:#FFD700;color:#000;padding:10px 14px;border-radius:20px;font-weight:bold;box-shadow:0 0 10px #FFD700;display:none;z-index:20;cursor:pointer" onclick="openCart()">0 zł • Zamów</div><div class="actions">
<button onclick="callNow()">📞</button>
<button onclick="openCart()">🛒 <span id="count">0</span></button>
<button onclick="openMap()">📍</button>
</div><script>
const colors=["#e53935","#8e24aa","#3949ab","#00897b","#f4511e","#6d4c41"];

const menu=[
 {n:"🍲 ZUPY",i:[["Zupa PHO",25],["Zupa wonton",22],["Zupa z kurczakiem",25],["Zupa z krewetkami",17]]},
 {n:"🥩 WOŁOWINA",i:[["Wołowina 5 smaków",29],["Wołowina pikantna 🌶️",29],["Wołowina curry",29],["Wołowina po tajsku 🌶️",29],["Wołowina z grzybami mun",29]]},
 {n:"🦆 KACZKA",i:[["Kaczka z warzywami",30],["Kaczka pikantna 🌶️",30],["Kaczka słodko-kwaśna",30],["Kaczka po tajsku 🌶️",30],["Kaczka po chińsku 🌶️",30]]},
 {n:"🍗 KURCZAK",i:[["Kurczak 5 smaków",25],["Kurczak pikantny 🌶️",25],["Kurczak słodko-kwaśny",25],["Kurczak po tajsku 🌶️",25],["Kurczak po chińsku 🌶️",25]]},
 {n:"🍤 KREWETKI",i:[["Krewetki z warzywami",30],["Krewetki pikantne 🌶️",30],["Krewetki z sezamem",30],["Krewetki po tajsku 🌶️",30],["Krewetki chrupiące",30]]},
 {n:"🐟 RYBA",i:[["Ryba 5 smaków",25],["Ryba pikantna 🌶️",25],["Ryba słodko-kwaśna",25],["Ryba po tajsku 🌶️",25],["Ryba z warzywami",25]]},
 {n:"🍗 UDKO",i:[["Udko 5 smaków",25],["Udko pikantne 🌶️",25],["Udko słodko-kwaśne",25],["Udko po tajsku 🌶️",25],["Udko po chińsku 🌶️",25]]},
 {n:"🍽️ ZESTAWY GORĄCE",i:[["🌶️ Kurczak z warzywami",30],["🌶️ Schab po tajsku",32],["🌶️ Wołowina po tajsku",35],["🌶️ Krewetki chrupiące",35],["🌶️ Udko po chińsku",31],["🌶️ Wieprzowina po tajsku",31],["🌶️ Kaczka pekińska",35],["🌶️ Ryba po tajsku",32],["🌶️ Kurczak po tajsku",30],["🌶️ Krewetki po tajsku",38],["🌶️ Kurczak po wietnamsku",32],["🌶️ Wołowina teriyaki",40]]},
 {n:"🍜 PAD THAI",i:[["Warzywa",25],["Tofu",26],["Kurczak",28],["Kaczka",30],["Wołowina",30],["Krewetki",32]]},
 {n:"🍜 MAKARON UDON",i:[["Warzywa",25],["Tofu",26],["Kurczak",28],["Kaczka",30],["Wołowina",30],["Krewetki",32]]},
 {n:"🍜 MAKARON SOJOWY",i:[["Warzywa",25],["Tofu",26],["Kurczak",28],["Kaczka",30],["Wołowina",30],["Krewetki",32]]},
 {n:"🍜 MAKARON CHIŃSKI",i:[["Warzywa",25],["Tofu",26],["Kurczak",28],["Kaczka",30],["Wołowina",30],["Krewetki",32]]},
 {n:"🥭 MAKARON MANGO",i:[["Kurczak",28],["Kaczka",30],["Wołowina",30],["Krewetki",32]]},
 {n:"🍚 RYŻ SMAŻONY",i:[["Warzywa",24],["Tofu",26],["Kurczak",26],["Kaczka",28],["Wołowina",28],["Krewetki",30]]},
 {n:"🥟 PRZEKĄSKI",i:[["Kurczak chrupiący",25],["Sajgonki",25],["Mix Bao Bao",25],["Krewetki chrupiące",30]]},
 {n:"🍛 DANIA SPECJALNE",i:[["Wołowina Luc Lac",35],["Makaron ryżowy mango",30],["Krewetki z zielonym ryżem",40]]},
 {n:"📦 BOXY",i:[["Box Bao Bao",22],["Kurczak z makaronem",22]]},
 {n:"🥤 NAPOJE",i:[["Woda",5],["Cola / Fanta / Sprite",7],["Sok",8],["Herbata",5]]}
];

let cart=[];

function render(){
 let t='',m='';
 menu.forEach((s,i)=>{
  let c=colors[i%colors.length];
  t+=`<div class='tab' style='background:${c}' onclick='go(${i})'>${s.n}</div>`;

  m+=`<div class='section' id='s${i}' style='border-left:5px solid ${c}'>`;
  m+=`<div class='title' style='background:${c}'>${s.n}</div>`;

  s.i.forEach(it=>{
   m+=`<div class='item'>
<span>${it[0]}</span>
<span class='price'>${it[1]} zł <button class='add' onclick="add('${it[0]}',${it[1]})">+</button></span>
</div>`;
  });

  m+='</div>';
 });
 document.getElementById('tabs').innerHTML=t;
 document.getElementById('menu').innerHTML=m;
}

function go(i){document.getElementById('s'+i).scrollIntoView({behavior:'smooth'})}
function add(n,p){
 let f=cart.find(x=>x.n==n);
 if(f)f.q++;
 else cart.push({n,p,q:1});
 update();

 // hiệu ứng nổi giá
 const items=document.querySelectorAll('.item');
 items.forEach(el=>{
   if(el.innerText.includes(n)){
     el.style.transform='scale(1.03)';
     el.style.boxShadow='0 0 15px #FFD700';

     const priceEl = el.querySelector('.price');
     if(priceEl){
       priceEl.style.color='#00e676';
       priceEl.style.fontSize='18px';
     }

     setTimeout(()=>{
       el.style.transform='scale(1)';
       el.style.boxShadow='none';
       if(priceEl){
         priceEl.style.color='#FFD700';
         priceEl.style.fontSize='';
       }
     },400);
   }
 });
}

function update(){
 let floating=document.getElementById('floatingTotal');
 let total=0,count=0,html='';
 cart.forEach((x,i)=>{
  total+=x.p*x.q;count+=x.q;
  html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;background:#111;padding:8px;border-radius:8px;">
 <div>
  ${x.n}<br><small>${x.p} zł x ${x.q} = ${x.p*x.q} zł</small>
 </div>
 <div>
  <button onclick='qty(${i},-1)'>➖</button>
  <b>${x.q}</b>
  <button onclick='qty(${i},1)'>➕</button>
 </div>
</div>`;
 });
 let ship=total>=200?0:10;
 document.getElementById('cartItems').innerHTML=html+`<hr>Dostawa ${ship} zł<br><b>${total+ship} zł</b>`;
 document.getElementById('total').innerText=(total+ship)+' zł';
 document.getElementById('count').innerText=count;

 // hiển thị giá nổi
 if(total>0){
   floating.style.display='block';
   floating.innerText=(total+ship)+' zł';
 }else{
   floating.style.display='none';
 }
}

function qty(i,d){cart[i].q+=d;if(cart[i].q<=0)cart.splice(i,1);update()}
function openCart(){document.getElementById('cartBox').style.display='block'}
function closeCart(){document.getElementById('cartBox').style.display='none'}
function callNow(){location.href='tel:694189888'}
function openMap(){
 // Google Maps – dokładna nazwa restauracji
 window.open('https://www.google.com/maps/search/?api=1&query=Bao+Bao+Kuchnia+Azjatycka+Tarnowskie+G%C3%B3ry');
}

function sendWhatsApp(){
 let text='Zamówienie:%0A';
 cart.forEach(x=>text+=x.n+' x'+x.q+'%0A');
 let name=document.getElementById('name').value;
 let phone=document.getElementById('phone').value;
 let address=document.getElementById('address').value;
 text+=`%0AImię: ${name}%0ATelefon: ${phone}%0AAdres: ${address}`;
 window.open(`https://wa.me/48694189888?text=${text}`);
}

function sendEmail(){
 let text='Zamówienie:%0A';
 cart.forEach(x=>text+=x.n+' x'+x.q+'%0A');
 let name=document.getElementById('name').value;
 let phone=document.getElementById('phone').value;
 let address=document.getElementById('address').value;
 text+=`%0AImię: ${name}%0ATelefon: ${phone}%0AAdres: ${address}`;
 window.location.href=`mailto:baobaokuchniaazjatycka@gmail.com?subject=Zamówienie&body=${text}`;
}

function check(){
 let d=new Date(),day=d.getDay(),h=d.getHours();
 let open=(day>=1&&day<=6&&h>=10&&h<21)||(day==0&&h>=10&&h<20);
 document.getElementById('status').innerText=open?'🟢 Otwarte':'🔴 Zamknięte';
}

render();update();check();
</script></body>
</html>
