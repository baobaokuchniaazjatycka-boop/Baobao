<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAO BAO KUCHNIA AZJATYCKA</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
header{background:#c62828;padding:20px;text-align:center}
h1{margin:0}

.status{margin-top:10px;font-weight:bold}

.section{padding:15px}
.title{
  background:#FFD700;
  color:#000;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  font-weight:bold
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1a1a1a;
  margin-bottom:10px;
  padding:12px;
  border-radius:12px
}

.price{color:#FFD700;font-weight:bold}

button{
  background:#38d000;
  border:none;
  color:#fff;
  padding:6px 10px;
  border-radius:8px
}

.actions{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px
}

.cart{
  position:fixed;
  bottom:60px;
  width:100%;
  background:#000;
  display:none;
  padding:15px;
  border-top-left-radius:20px;
  border-top-right-radius:20px
}
</style>
</head>

<body>

<header>
<h1>🍜 BAO BAO KUCHNIA</h1>
<div class="status" id="status"></div>
</header>

<div class="section">
<div class="title">🍲 ZUPY</div>

<div class="item">
<span>Zupa PHO</span>
<span class="price">25 zł</span>
<button onclick="add()">+</button>
</div>

<div class="item">
<span>Zupa wonton</span>
<span class="price">22 zł</span>
<button onclick="add()">+</button>
</div>

</div>

<div class="actions">
<button onclick="call()">📞</button>
<button onclick="toggleCart()">🛒</button>
<button onclick="map()">📍</button>
</div>

<div class="cart" id="cart">
<p>Giỏ hàng đang trống</p>
</div>

<script>
function add(){
  alert("Đã thêm món!")
}

function toggleCart(){
  let c = document.getElementById("cart")
  c.style.display = c.style.display==="block"?"none":"block"
}

function call(){
  window.location.href="tel:694189888"
}

function map(){
  window.open("https://maps.google.com?q=baobao kuchnia azjatycka")
}

// giờ mở cửa
function checkTime(){
  let now=new Date()
  let h=now.getHours()
  let d=now.getDay()

  let open=(d>=1 && d<=6 && h>=10 && h<21) || (d==0 && h>=10 && h<20)

  document.getElementById("status").innerHTML=
    open?"🟢 Otwarte":"🔴 Zamknięte"
}
checkTime()
</script>

</body>
</html>
